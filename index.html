<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-width:320px;max-width:100vw;overflow-x:hidden}
body{font-family:"Noto Sans SC",sans-serif;background:#1a1a2e;color:#eaeaea;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
.screen-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.screen-overlay.hidden{display:none}
.game-title{font-size:3rem;font-weight:900;color:#e94560;text-shadow:0 0 30px rgba(233,69,96,.6);letter-spacing:6px;margin-bottom:8px}
.game-subtitle{font-size:1rem;color:#888;margin-bottom:40px}
.start-btn{padding:16px 60px;font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,#e94560,#c23152);color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit;box-shadow:0 6px 25px rgba(233,69,96,.5)}
.start-btn:hover{transform:scale(1.05)}
.day-banner{font-size:2.5rem;font-weight:900;color:#ffc107;text-shadow:0 0 20px rgba(255,193,7,.5);margin-bottom:10px}
.time-label{font-size:1.2rem;color:#aaa;margin-bottom:30px}
.proceed-btn{padding:12px 40px;font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#4ade80,#22c55e);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit}
.event-area{width:100%;max-width:700px;min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.event-title{font-size:1.5rem;font-weight:700;color:#ffc107;margin-bottom:15px}
.event-desc{font-size:1rem;color:#ccc;margin-bottom:25px;line-height:1.6}
.choice-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:400px}
.choice-btn{padding:12px 20px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);border-radius:8px;color:#eaeaea;font-family:inherit;font-size:.95rem;cursor:pointer;transition:all .15s;text-align:left}
.choice-btn:hover{background:rgba(233,69,96,.2);border-color:#e94560;transform:translateX(5px)}
.battle-ui{width:100%;max-width:700px;display:flex;flex-direction:column;align-items:center}
.battle-ui.hidden{display:none}
.battlefield{width:100%;display:flex;flex-direction:column;align-items:center;padding:15px 0}
.enemy-zone{display:flex;flex-direction:column;align-items:center;margin-bottom:10px}
.enemy-sprite{font-size:5rem;filter:drop-shadow(0 0 15px rgba(233,69,96,.6))}
.enemy-sprite.hit{animation:hitFlash .3s}
@keyframes hitFlash{0%,100%{filter:drop-shadow(0 0 15px rgba(233,69,96,.6))}50%{filter:drop-shadow(0 0 30px #fff);brightness(2)}}
.enemy-sprite.dead{opacity:0;transform:scale(.5) rotate(15deg);transition:all .5s}
.enemy-name{font-weight:700;color:#e94560;font-size:1.1rem;margin-top:4px}
.enemy-hp-bar{width:160px;height:12px;background:#333;border-radius:6px;margin-top:6px;overflow:hidden}
.enemy-hp-fill{height:100%;background:linear-gradient(90deg,#e94560,#ff6b6b);transition:width .3s;border-radius:6px}
.enemy-intent{margin-top:8px;font-size:.9rem;font-weight:700;padding:4px 12px;border-radius:12px;background:rgba(255,255,255,.08)}
.hud{width:100%;max-width:700px;display:flex;gap:18px;justify-content:center;margin:10px 0;font-size:.95rem;font-weight:700}
.hud-stat{display:flex;align-items:center;gap:5px}
.hp-color{color:#ff6b6b}.energy-color{color:#ffe66d}.shield-color{color:#4ecdc4}.stress-color{color:#9b59b6}
.log{width:100%;max-width:700px;height:70px;overflow-y:auto;background:rgba(0,0,0,.3);border-radius:8px;padding:8px 12px;font-size:.72rem;color:#aaa;margin-bottom:6px}

.hand-area{width:100%;max-width:900px;min-height:140px;display:flex;justify-content:center;align-items:center;gap:7px;flex-wrap:wrap;padding:8px;background:rgba(255,255,255,.03);border-radius:12px;margin-bottom:6px}
.card{width:96px;height:128px;border-radius:8px;padding:5px;display:flex;flex-direction:column;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;font-size:.72rem;flex-shrink:0}
.card:hover{transform:translateY(-10px);box-shadow:0 8px 25px rgba(0,0,0,.5);z-index:10}
.card.playable{box-shadow:0 0 14px rgba(255,230,109,.5);border:2px solid #ffe66d}
.card.unplayable{opacity:.45;cursor:not-allowed;filter:grayscale(.4)}
.card.playing{animation:cardPlay .35s forwards}
@keyframes cardPlay{0%{transform:scale(1)}50%{transform:scale(1.15) translateY(-25px)}100%{transform:scale(0) translateY(-80px);opacity:0}}
.cost-0{background:linear-gradient(145deg,#2d5a3d,#1e3d29);border:2px solid #4ade80}
.cost-1{background:linear-gradient(145deg,#3d4a6b,#2a3254);border:2px solid #60a5fa}
.cost-2{background:linear-gradient(145deg,#6b4a3d,#54342a);border:2px solid #fb923c}
.cost-3{background:linear-gradient(145deg,#6b3d5a,#542a45);border:2px solid #f472b6}
.card-cost{position:absolute;top:-6px;right:-6px;width:20px;height:20px;background:#ffe66d;color:#1a1a2e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.75rem;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.card-name{font-weight:700;font-size:.78rem;text-align:center;color:#fff;margin:1px 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-effect{font-size:.58rem;color:#ccc;text-align:center;flex:1;display:flex;align-items:center;justify-content:center;line-height:1.3;padding:0 2px}
.card-type{font-size:.5rem;text-align:center;color:rgba(255,255,255,.6);letter-spacing:.5px;font-weight:600;text-transform:uppercase;padding:1px 0}
.type-attack{color:#ff6b6b}
.type-skill{color:#60a5fa}
.type-power{color:#c084fc}
.type-curse{color:#f87171}
.end-turn-btn{padding:9px 28px;font-size:1rem;font-weight:700;background:linear-gradient(135deg,#e94560,#c23152);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;box-shadow:0 4px 15px rgba(233,69,96,.4)}
.end-turn-btn:hover{transform:translateY(-2px)}
.end-turn-btn:disabled{background:#444;color:#888;cursor:not-allowed}
.log-entry{display:flex;align-items:center;gap:5px;font-size:.8rem;padding:3px 6px;border-radius:4px;margin-bottom:2px;background:rgba(0,0,0,.2)}
.log-entry.damage{color:#ff6b6b;background:rgba(255,107,107,.1)}
.log-entry.heal{color:#4ade80;background:rgba(74,222,128,.1)}
.log-entry.stress{color:#fb923c;background:rgba(251,146,60,.1)}
.log-entry.event{color:#a78bfa;background:rgba(167,139,250,.1)}
.log-entry.player{color:#60a5fa;background:rgba(96,165,250,.1)}
.log-entry.breakdown{color:#f472b6;background:rgba(244,114,182,.2);font-weight:700}
.log-entry.special{color:#fbbf24;background:rgba(251,191,36,.1)}
.log-icon{font-size:.9rem;flex-shrink:0}
.relic-choice{cursor:pointer;background:rgba(255,255,255,.06);border:2px solid rgba(255,193,7,.3);border-radius:12px;padding:16px 20px;min-width:120px;text-align:center;transition:transform .15s,border-color .15s}
.relic-choice:hover{transform:translateY(-4px);border-color:#ffc107;background:rgba(255,193,7,.1)}
.dmg-popup{position:fixed;font-size:1.6rem;font-weight:900;color:#ff6b6b;text-shadow:2px 2px 0 #000;pointer-events:none;z-index:200;animation:popUp .8s forwards}
@keyframes popUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(1.4)}}
.shield-popup{color:#4ecdc4}
.screen-title{font-size:2.2rem;font-weight:900;margin-bottom:12px}
.win-title{color:#4ade80;text-shadow:0 0 30px rgba(74,222,128,.5)}
.lose-title{color:#e94560;text-shadow:0 0 30px rgba(233,69,96,.5)}
.screen-sub{font-size:1rem;color:#aaa;margin-bottom:20px}
.screen-btn{padding:12px 36px;font-size:1rem;font-weight:700;background:#e94560;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;margin:5px;transition:transform .1s}
.screen-btn:hover{transform:scale(1.05)}
.screen-btn.green{background:#22c55e}
.day-clear-title{font-size:2rem;color:#4ade80;margin-bottom:10px}
.day-clear-sub{color:#aaa;margin-bottom:20px}
.reward-cards{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.reward-cards .card{cursor:pointer}
.reward-cards .card:hover{transform:translateY(-8px) scale(1.05);box-shadow:0 8px 25px rgba(255,230,109,.5)}
.relic-display{display:flex;gap:8px;justify-content:center;margin:4px 0;font-size:.75rem;min-height:20px;flex-wrap:wrap}
.relic-tag{background:rgba(255,193,7,.2);border:1px solid rgba(255,193,7,.4);padding:2px 8px;border-radius:10px;color:#ffc107}
body.breakdown{animation:breakdownPulse .8s infinite}
@keyframes breakdownPulse{0%,100%{box-shadow:inset 0 0 60px rgba(233,69,96,.3)}50%{box-shadow:inset 0 0 100px rgba(233,69,96,.6)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
body.shaking{animation:shake .3s}
.day-progress{display:flex;gap:6px;margin-bottom:15px}
.day-dot{width:12px;height:12px;border-radius:50%;background:#333;border:2px solid #555}
.day-dot.done{background:#4ade80;border-color:#4ade80}
.day-dot.current{background:#ffc107;border-color:#ffc107;box-shadow:0 0 8px rgba(255,193,7,.6)}
@media(max-width:500px){
.card{width:72px;height:100px;font-size:.65rem;padding:4px}
.card-cost{width:17px;height:17px;font-size:.68rem;top:-5px;right:-5px}
.card-name{font-size:.65rem}
.card-effect{font-size:.52rem}
.hud{gap:8px;font-size:.82rem}
.enemy-sprite{font-size:3.5rem}
.screen-title{font-size:1.8rem}
.game-title{font-size:2rem;letter-spacing:2px}
.proceed-btn,.screen-btn{padding:10px 28px;font-size:.95rem}
.choice-btn{padding:10px 16px;font-size:.85rem}
.event-desc{font-size:.88rem}
.log{font-size:.65rem}
}
</style>

<body>
<div class="screen-overlay" id="title-screen"><div class="game-title">下班复仇记</div><div class="game-subtitle">5天逃脱计划 · 肉鸽卡牌</div><button class="start-btn" onclick="game.startGame()">开始逃脱</button></div>
<div class="screen-overlay hidden" id="day-transition"><div class="day-progress" id="day-progress"></div><div class="day-banner" id="day-banner">Day 1</div><div class="time-label" id="time-label">09:00</div><button class="proceed-btn" onclick="game.proceedFromTransition()">确认</button></div>
<div class="screen-overlay hidden" id="event-screen"><div class="event-area"><div class="event-title" id="event-title">事件</div><div class="event-desc" id="event-desc"></div><div class="choice-btns" id="choice-btns"></div></div></div>
<div class="battle-ui hidden" id="battle-ui">
  <div class="hud"><div class="hud-stat hp-color">❤️ <span id="hp">50/50</span></div><div class="hud-stat energy-color">⚡ <span id="energy">3/3</span></div><div class="hud-stat shield-color">🛡️ <span id="shield">0</span></div><div class="hud-stat stress-color">😰 <span id="stress">0/10</span></div></div>
  <div class="relic-display" id="relic-display"></div>
  <div class="battlefield"><div class="enemy-zone"><div class="enemy-sprite" id="enemy-sprite">👔</div><div class="enemy-name" id="enemy-name">敌人</div><div class="enemy-hp-bar"><div class="enemy-hp-fill" id="enemy-hp-fill" style="width:100%"></div></div><div class="enemy-intent" id="enemy-intent">👁️</div></div><button class="end-turn-btn" id="end-turn-btn" onclick="game.endTurn()">结束回合</button></div>
  <div class="log" id="log"></div>
  <div class="hand-area" id="hand"></div>
</div>
<div class="screen-overlay hidden" id="win-screen"><div class="screen-title win-title">🎉 战斗胜利！</div><div class="screen-sub">选择1张卡加入牌组</div><div class="reward-cards" id="reward-section"></div></div>
<div class="screen-overlay hidden" id="lose-screen"><div class="screen-title lose-title">💀 你倒下了</div><div class="screen-sub" id="lose-reason">被优化了</div><button class="screen-btn" onclick="game.retryBoss()">重试BOSS</button><button class="screen-btn" onclick="game.restartGame()">重新上岗</button></div>
<div class="screen-overlay hidden" id="dayclear-screen"><div class="day-clear-title" id="dayclear-title">✅ Day 1 完成！</div><div class="day-clear-sub" id="dayclear-sub"></div><button class="proceed-btn" onclick="game.nextDay()">进入下一天</button></div>
<div class="screen-overlay hidden" id="finalwin-screen"><div class="screen-title win-title">🏆 你逃出了公司！</div><div class="screen-sub">5天轮回结束，重获自由</div><button class="screen-btn green" onclick="game.restartGame()">再逃一次</button></div>
<div class="screen-overlay hidden" id="relic-screen">
  <div class="screen-title" style="color:#ffc107">选择一个遗物</div>
  <div id="relic-options" style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:20px 0"></div>
  <button class="screen-btn" onclick="game.skipRelic()">跳过</button>
</div>
</body>
